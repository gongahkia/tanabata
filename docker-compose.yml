services:
  api:
    build:
      context: ./api
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-unknown}
        REVISION: ${REVISION:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    environment:
      CATALOG_PATH: /app/data/catalog.sqlite
      PORT: "8080"
    volumes:
      - catalog-data:/app/data
    ports:
      - "18080:8080"
    restart: on-failure:5
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 5

volumes:
  catalog-data:
