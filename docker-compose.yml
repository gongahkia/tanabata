services:
  api:
    build:
      context: ./api
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    environment:
      CATALOG_PATH: /app/data/catalog.sqlite
      PORT: "8080"
    volumes:
      - ./api/data:/app/data
    ports:
      - "18080:8080"
