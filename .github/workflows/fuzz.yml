name: fuzz

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: ./internal/catalog
            target: FuzzFTSQueryBuilder
          - package: ./internal/search
            target: FuzzQuoteNormalize
          - package: ./internal/catalog
            target: FuzzArtistIDResolve
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum
      - run: go test ${{ matrix.package }} -run=^$ -fuzz=^${{ matrix.target }}$ -fuzztime=30s
