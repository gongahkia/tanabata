name: Tanabata CI/CD on push

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.24.x, 1.25.x, stable]
    defaults:
      run:
        working-directory: ./api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - run: go test -race -shuffle=on ./...

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ./api/go.mod
      - run: ./scripts/check-go-coverage.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ./api/go.mod
      - uses: golangci/golangci-lint-action@v8
        with:
          working-directory: ./api

  container-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/api-container-smoke-benchmark.sh

  e2e-sweep:
    runs-on: ubuntu-latest
    needs: container-smoke
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/e2e-endpoint-sweep.sh

  gosec:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ./api/go.mod
      - run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run gosec
        run: gosec -no-fail -fmt sarif -out gosec.sarif ./...
      - name: Upload gosec SARIF
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: api/gosec.sarif
          category: gosec

  govulncheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ./api/go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Generate govulncheck SARIF
        run: |
          govulncheck -format sarif ./... > govulncheck.sarif
          # govulncheck can emit duplicate CVE tags; GitHub rejects that SARIF.
          jq '(.runs[]?.tool.driver.rules[]?.properties.tags) |= unique' govulncheck.sarif > govulncheck.clean.sarif
          mv govulncheck.clean.sarif govulncheck.sarif
      - name: Check HIGH/CRITICAL govulncheck findings
        run: |
          govulncheck -format json ./... > govulncheck.json
          jq -e '[.. | objects | (.severity? // .database_specific?.severity? // empty) | select(type == "string") | ascii_upcase | select(. == "HIGH" or . == "CRITICAL")] | length == 0' govulncheck.json
      - name: Upload govulncheck SARIF
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: api/govulncheck.sarif
          category: govulncheck

  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
      - name: Skip dependency review on push
        if: github.event_name != 'pull_request'
        run: echo "Dependency review only runs on pull_request events."

  trivy-image:
    runs-on: ubuntu-latest
    needs: container-smoke
    steps:
      - uses: actions/checkout@v4
      - name: Build image for Trivy
        run: docker build -f api/Dockerfile -t tanabata-api:${{ github.sha }} .
      - name: Run Trivy image scan
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: tanabata-api:${{ github.sha }}
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
      - name: Upload Trivy SARIF
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
      - name: Fail on Trivy findings
        if: steps.trivy.outcome == 'failure'
        run: exit 1
