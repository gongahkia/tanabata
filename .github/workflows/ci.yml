name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ./api/go.mod
      - run: go test ./...

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ./api/go.mod
      - run: ./scripts/check-go-coverage.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ./api/go.mod
      - uses: golangci/golangci-lint-action@v8
        with:
          working-directory: ./api

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./web/package-lock.json
      - run: npm ci
      - run: npm run generate:client
      - run: git diff --exit-code src/generated/client.ts
      - run: npm test
      - run: npm run build

  container-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t tanabata-api ./api
      - run: docker run -d --name tanabata-api -p 8080:8080 tanabata-api
      - run: |
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8080/readyz >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1
      - run: curl -fsS http://127.0.0.1:8080/v1/providers
      - run: docker build -t tanabata-web ./web
