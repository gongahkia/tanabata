name: Tanabata Catalog Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"

jobs:
  refresh:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/setup-go@v5
        with:
          go-version-file: ./api/go.mod

      - name: Set refresh metadata
        run: echo "CATALOG_REFRESH_DATE=$(date -u +%Y%m%d)" >> "$GITHUB_ENV"

      - name: Capture pre-refresh row counts
        run: |
          count_table() {
            python3 -c 'import sqlite3,sys; db,table=sys.argv[1:]; con=sqlite3.connect(db); exists=con.execute("SELECT 1 FROM sqlite_master WHERE type=? AND name=?", ("table", table)).fetchone(); print(con.execute(f"SELECT count(*) FROM {table}").fetchone()[0] if exists else 0)' api/data/catalog.sqlite "$1"
          }
          {
            echo "quotes=$(count_table quotes)"
            echo "claims=$(count_table claims)"
            echo "recordings=$(count_table recordings)"
          } >> "$GITHUB_ENV"

      - name: Install scraper dependencies
        working-directory: ./scraper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Refresh scraped source data
        working-directory: ./scraper
        run: python main.py

      - name: Rebuild catalog
        working-directory: ./api
        run: go run ./cmd/ingest -bootstrap=true -all=true -name scheduled-catalog-refresh

      - name: Build refresh PR body
        run: |
          count_table() {
            python3 -c 'import sqlite3,sys; db,table=sys.argv[1:]; con=sqlite3.connect(db); exists=con.execute("SELECT 1 FROM sqlite_master WHERE type=? AND name=?", ("table", table)).fetchone(); print(con.execute(f"SELECT count(*) FROM {table}").fetchone()[0] if exists else 0)' api/data/catalog.sqlite "$1"
          }
          quotes_after="$(count_table quotes)"
          claims_after="$(count_table claims)"
          recordings_after="$(count_table recordings)"
          {
            echo "Scheduled catalog refresh."
            echo
            echo "| table | before | after | delta |"
            echo "| --- | ---: | ---: | ---: |"
            echo "| quotes | ${quotes} | ${quotes_after} | $((quotes_after - quotes)) |"
            echo "| claims | ${claims} | ${claims_after} | $((claims_after - claims)) |"
            echo "| recordings | ${recordings} | ${recordings_after} | $((recordings_after - recordings)) |"
          } > /tmp/catalog-refresh-pr.md

      - name: Open catalog refresh PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: |
            Refresh catalog artifacts

            [skip ci]
          title: "Refresh catalog artifacts"
          body-path: /tmp/catalog-refresh-pr.md
          branch: refresh/catalog-${{ env.CATALOG_REFRESH_DATE }}
          labels: data-integrity
          add-paths: |
            api/data/quotes.json
            api/data/catalog.sqlite
