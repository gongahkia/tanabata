name: Catalog Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"

jobs:
  refresh:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/setup-go@v5
        with:
          go-version-file: ./api/go.mod

      - name: Install scraper dependencies
        working-directory: ./scraper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Refresh scraped source data
        working-directory: ./scraper
        run: python main.py

      - name: Rebuild catalog
        working-directory: ./api
        run: go run ./cmd/ingest -bootstrap=true -all=true -name scheduled-catalog-refresh

      - name: Commit refreshed artifacts
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add api/data/quotes.json api/data/catalog.sqlite
          if git diff --cached --quiet; then
            echo "No catalog changes to commit"
            exit 0
          fi
          git commit -m "Refresh catalog artifacts"
          git push
