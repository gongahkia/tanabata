name: Feature request
description: Propose a bounded product or developer improvement.
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: Motivation
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives
    validations:
      required: true
